  <script defer>
    /* Set the PDF.js worker source AFTER pdf.min.js loads.
       defer scripts execute in document order, so pdfjsLib is defined here.
       (Previously this line was in the inline body script, where it ran before
       pdf.min.js and threw ReferenceError, which halted the script and prevented
       the dark-mode class from being applied — light mode flash.) */
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  </script></head>

<body>

        <h2>Certificates</h2>

      </div>

      <div class="certificates-grid" id="certificates-grid">
         </div>
    </section>
  </main>

  <script>
    function parseFrontmatter(mdText) {
      var metadata = {};
      var fmMatch = mdText.match(/^---\r?\n([\s\S]+?)\r?\n---[ \t]*\r?\n?/);
      if (fmMatch) {
        var lines = fmMatch[1].split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var colon = line.indexOf(':');
          if (colon > 0) {
            var key = line.slice(0, colon).trim();
            var val = line.slice(colon + 1).trim().replace(/^['"]|['"]$/g, '');
            metadata[key] = val;
          }
        }
      }
      return metadata;
    }

    async function loadCertificates() {
      var grid = document.getElementById('certificates-grid');
      if (!grid) return;
      grid.innerHTML = '<p class="gallery-status">Loading certificates...</p>';

      try {
        var res = await fetch('certificates/index.json');
        if (!res.ok) throw new Error('Could not load certificates/index.json');
        var files = await res.json();

        var certs = [];
        var certResults = await Promise.all(files.map(async function(file) {
          try {
            var r = await fetch('certificates/' + file);
            if (!r.ok) return null;
            var mdText = await r.text();
            var m = parseFrontmatter(mdText);
            return m.name ? m : null;
          } catch (e) {
            console.error('Error parsing certificate:', file, e);
            return null;
          }
        }));
        for (var j = 0; j < certResults.length; j++) {
          if (certResults[j]) certs.push(certResults[j]);
        }

        renderCertificates(certs);
      } catch (err) {
        console.error('Error loading certificates:', err);
        grid.innerHTML = '<p class="gallery-empty">Error loading certificates. Make sure certificates/index.json exists.</p>';
      }
    }

    function renderCertificates(certs) {
      var grid = document.getElementById('certificates-grid');
      if (!grid) return;
      grid.innerHTML = '';

      if (certs.length === 0) {
        grid.innerHTML = '<p class="gallery-empty">No certificates found.</p>';
        return;
      }

      certs.forEach(function(cert) {
        var isPDF = cert.file && cert.file.toLowerCase().endsWith('.pdf');

        var previewHTML;
        if (!cert.file) {
          previewHTML = '<span class="certificate-icon-placeholder">&#128196;</span>';
        } else if (isPDF) {
          previewHTML = `
            <a href="${cert.file}" target="_blank" rel="noopener" aria-label="Open full ${cert.name} document">
              <canvas class="pdf-thumbnail" data-src="${cert.file}"></canvas>
            </a>`;
        } else {
          previewHTML = `
            <a href="${cert.file}" target="_blank" rel="noopener" aria-label="Open full ${cert.name} image">
              <img src="${cert.file}" alt="${cert.name} preview" loading="lazy">
            </a>`;
        }

        var metaParts = [];
        if (cert.issue_date) metaParts.push('<span class="meta-item"><strong>Issued:</strong> ' + cert.issue_date + '</span>');
        if (cert.expiry_date) metaParts.push('<span class="meta-item"><strong>Expires:</strong> ' + cert.expiry_date + '</span>');
        if (cert.credential_id) metaParts.push('<span class="meta-item"><strong>ID:</strong> ' + cert.credential_id + '</span>');
        var metaHTML = metaParts.length ? '<div class="certificate-meta-info">' + metaParts.join('') + '</div>' : '';

        var viewBtn = cert.file
          ? '<a href="' + cert.file + '" target="_blank" rel="noopener" class="certificate-btn">&#128196; View Document</a>'
          : '';
        var verifyBtn = cert.credential_url
          ? '<a href="' + cert.credential_url + '" target="_blank" rel="noopener" class="certificate-btn secondary">&#9654; Verify Credential</a>'
          : '';

        var card = document.createElement('div');
        card.className = 'certificate-card';
        card.innerHTML = `
          <div class="certificate-preview-container">
            ${previewHTML}
          </div>
          <div class="certificate-details">
            <div>
              <div class="certificate-header-row">
                <h3>${cert.name}</h3>
                ${cert.issuer ? '<span class="certificate-issuer">' + cert.issuer + '</span>' : ''}
              </div>
              <p>${cert.bio || ''}</p>
              ${metaHTML}
            </div>
            <div class="certificate-actions">
              ${viewBtn}
              ${verifyBtn}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      renderPdfThumbnails();
    }

    function renderPdfThumbnails() {
      var canvases = document.querySelectorAll('.pdf-thumbnail');
      canvases.forEach(function(canvas) {
        var url = canvas.getAttribute('data-src');
        
        pdfjsLib.getDocument(url).promise.then(function(pdf) {
          return pdf.getPage(1);
        }).then(function(page) {
          var viewport = page.getViewport({ scale: 1.5 });
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          
          var renderContext = {
            canvasContext: canvas.getContext('2d'),
            viewport: viewport
          };
          page.render(renderContext);
        }).catch(function(err) {
          console.error('Error rendering snapshot for preview:', url, err);
        });
      });
    }

    loadCertificates();
  </script>  <!-- Service worker for offline support (PWA). Silently fails on origins
