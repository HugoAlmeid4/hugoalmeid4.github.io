<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space | Hralmeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilex:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #111;
            --accent: #007bff;
        }

        body.dark-mode {
            --bg: #000;
            --text: #eee;
            --accent: #007bff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Lilex', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        img {
            max-width: 300px;
            height: auto;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin: 20px 0 40px 0;
        }

        .home-btn {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--text);
            padding: 12px 24px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .home-btn:hover {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>

<body>
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="container">
        <img src="imgs/Frame10.png" alt="Astronaut Dog - Lost in Space">
        <h1>404</h1>
        <p>Houston, we have a problem. <br> This page has drifted out of orbit.</p>
        <a href="index.html" class="home-btn">Return to Earth</a>
    </div>
</body>

</html>
