<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="404 — Hralmeida">
    <meta property="og:description" content="Houston, we have a problem. This page has drifted out of orbit.">
    <meta property="og:url" content="https://hugoalmeid4.github.io/404.html">
    <meta property="og:image" content="https://hugoalmeid4.github.io/imgs/og-default.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <title>404 - Lost in Space | Hralmeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilex:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="404.css?v=25">
  <script src="counter.js?v=25" defer></script>
  <script src="i18n.js?v=24" defer></script>
</head>

<body>
    <script>
        try {
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme !== 'light') document.body.classList.add('dark-mode');
            var savedLang  = localStorage.getItem('blogLanguage');
            if (savedLang === 'pt' || savedLang === 'es' || savedLang === 'en') {
                document.documentElement.setAttribute('lang', savedLang);
                if (savedLang !== 'en' && document.body) document.body.classList.add('i18n-pending');
            }
        } catch (e) {
            document.body.classList.add('dark-mode');
        }
        window.__i18nPendingTimer = setTimeout(function () {
            if (document.body) document.body.classList.remove('i18n-pending');
            window.__i18nPendingTimer = null;
        }, 1500);
    </script>

    <div class="container">
        <picture>
          <source srcset="/imgs/Frame10.webp" type="image/webp">
          <img src="/imgs/Frame10.png" alt="Astronaut Dog - Lost in Space" width="543" height="930" decoding="async" fetchpriority="high">
        </picture>
        <h1 data-i18n="err404">404</h1>
        <p data-i18n="err404Message">Houston, we have a problem. <br> This page has drifted out of orbit.</p>
        <a href="index.html" class="home-btn"><span data-i18n="returnHome">Return to Earth</span></a>
    </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(function () { /* disable PWA offline */ });
      });
    }
  </script>
</body>

</html>
