<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hralmeida's personal website and blog.">
  <title>Hralmeida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="posts.js" defer></script>
  <script async src="https://tally.so/widgets/embed.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch (e) {
      document.body.classList.add('dark-mode');
    }
  </script>

  <header class="Name-Photo">
    <img src="imgs/imgs.jpg" alt="Hralmeida profile picture" fetchpriority="high">
    <h3>Hralmeida</h3>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link active" aria-current="page">Home</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="gallery.html" class="nav-link">Gallery</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
  </header>

  <main class="Medium-Path">

    <section class="Bio-Socials">
      <div>
        <h2>Bio</h2>
        <p>Capturing light that traveled millions of years just to get here. I prefer silence and simple things. Just
          enjoying the view while the world turns, again.</p>
      </div>
      <div class="Socials">
        <h2>Socials</h2>
        <span>
          <a href="https://github.com/HugoAlmeid4" target="_blank" rel="noopener">Github</a>
          <p>-</p>
          <a href="https://gitlab.com/hralmeida" target="_blank" rel="noopener">Gitlab</a>
          <p>-</p>
          <a href=href="#tally-open=GxkEvO&tally-emoji-text=👋&tally-emoji-animation=wave">Contact Form</a>
          <p>-</p>
          <a href="https://www.linkedin.com/in/hugo-almeida-851b84419">LinkedIn</a>

        </span>
      </div>
    </section>

    <section class="Posts-Section">
      <h2>Most Recent Posts</h2>
      <div class="posts-scroll" id="postsList">
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="post-header-left" style="width: 100%;">
              <div class="skeleton-line" style="margin-bottom: 8px; max-width: 180px;"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </div>
        <div class="posts-status" id="postsStatus">Loading posts…</div>
      </div>
    </section>

  </main>

  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');

    function updateBtnText() {
      if (document.body.classList.contains('dark-mode')) {
        themeToggleBtn.textContent = 'Light Mode';
      } else {
        themeToggleBtn.textContent = 'Dark Mode';
      }
    }
    updateBtnText();

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      updateBtnText();
      try {
        const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      } catch (e) { }
    });
  </script>
</body>

</html>
