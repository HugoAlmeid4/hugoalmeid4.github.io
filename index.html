<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hralmeida</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch(e) {
      document.body.classList.add('dark-mode');
    }
  </script>

  <div class="Name-Photo">
    <img src="imgs/imgs.jpg" alt="Hralmeida">
    <h3>Hralmeida</h3>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
  </div>

  <div class="Medium-Path">

    <div class="Bio-Socials">
      <div>
        <h2>Bio</h2>
        <p>Capturing light that traveled millions of years just to get here. I prefer silence and simple things. Just
          enjoying the view while the world turns, again.</p>
      </div>
      <div class="Socials">
        <h2>Socials</h2>
        <span>
          <a href="https://github.com/HugoAlmeid4">Github</a>
          <p>-</p>
          <a href="https://www.youtube.com/@hralmeid44">Youtube</a>
          <p>-</p>
          <a href="">hralmeid4@gmail.com</a>
        </span>
      </div>
    </div>

    <div class="Posts-Section">
      <h2>Most Recent Posts</h2>
      <div class="posts-scroll" id="postsList">
        <div class="posts-status" id="postsStatus">Loading posts…</div>
      </div>
    </div>

  </div>

  <script src="posts.js"></script>
  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    
    function updateBtnText() {
      if (document.body.classList.contains('dark-mode')) {
        themeToggleBtn.textContent = 'Light Mode';
      } else {
        themeToggleBtn.textContent = 'Dark Mode';
      }
    }
    updateBtnText();

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      updateBtnText();
      try {
        const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      } catch(e) {}
    });
  </script>
</body>

</html>
