<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hralmeida's personal website, blog, and astrophotography portfolio.">
  <title>Hralmeida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="posts.js" defer></script>
  <script src="player.js" defer></script>
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch(e) {
      document.body.classList.add('dark-mode');
    }
  </script>

  <header class="Name-Photo">
    <img src="imgs/imgs.jpg" alt="Hralmeida profile picture" fetchpriority="high">
    <h3>Hralmeida</h3>
    <nav class="nav-links">
      <a href="index.html" class="nav-link active">Home</a>
      <span class="nav-separator">•</span>
      <a href="projects.html" class="nav-link">Projects</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
  </header>

  <main class="Medium-Path">

    <section class="Bio-Socials">
      <div>
        <h2>Bio</h2>
        <p>Capturing light that traveled millions of years just to get here. I prefer silence and simple things. Just
          enjoying the view while the world turns, again.</p>
      </div>
      <div class="Socials">
        <h2>Socials</h2>
        <span>
          <a href="https://github.com/HugoAlmeid4" target="_blank" rel="noopener">Github</a>
          <p>-</p>
          <a href="https://www.youtube.com/@hralmeid44" target="_blank" rel="noopener">Youtube</a>
          <p>-</p>
          <a href="mailto:hralmeid4@gmail.com">hralmeid4@gmail.com</a>
        </span>
      </div>
    </section>

    <section class="Posts-Section">
      <h2>Most Recent Posts</h2>
      <div class="posts-scroll" id="postsList">
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="post-header-left" style="width: 100%;">
              <div class="skeleton-line" style="margin-bottom: 8px; max-width: 180px;"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </div>
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="post-header-left" style="width: 100%;">
              <div class="skeleton-line" style="margin-bottom: 8px; max-width: 120px;"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </div>
        <div class="posts-status" id="postsStatus">Loading posts…</div>
      </div>
    </section>

  </main>

  <!-- ── Music Player ── -->
  <footer class="music-player" id="musicPlayer">
    <div class="player-controls">
      <button id="player-prev" class="player-btn" aria-label="Previous track">⟨</button>
      <button id="player-play" class="player-btn player-btn-play" aria-label="Play">▶</button>
      <button id="player-next" class="player-btn" aria-label="Next track">⟩</button>
    </div>
    <div class="player-info">
      <div class="player-track" id="player-track">No tracks added</div>
      <div class="player-progress" id="player-progress">
        <div class="player-progress-fill" id="player-progress-fill"></div>
      </div>
    </div>
    <div class="player-time" id="player-time">0:00</div>
    <input type="range" id="player-volume" class="player-volume" min="0" max="100" value="50" aria-label="Volume">
  </footer>

  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    
    function updateBtnText() {
      if (document.body.classList.contains('dark-mode')) {
        themeToggleBtn.textContent = 'Light Mode';
      } else {
        themeToggleBtn.textContent = 'Dark Mode';
      }
    }
    updateBtnText();

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      updateBtnText();
      try {
        const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      } catch(e) {}
    });
  </script>
</body>

</html>
