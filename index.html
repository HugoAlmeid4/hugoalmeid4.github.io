<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hralmeida's personal website and blog.">
  <title>Hralmeida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link rel="preload" href="style.css" as="style">
  <link rel="stylesheet" href="style.css">
  <script src="posts.js" defer></script>
  <script async src="https://tally.so/widgets/embed.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch (e) {
      document.body.classList.add('dark-mode');
    }
  </script>

  <header class="Name-Photo">
    <img src="imgs/imgs.jpg" alt="Hralmeida profile picture" width="100" height="100" fetchpriority="high">
    <h3>Hralmeida</h3>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link active" aria-current="page">Home</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="certificates.html" class="nav-link">Certificates</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
  </header>

  <main class="Medium-Path">

    <section class="Bio-Socials">
      <div>
        <h2>Bio</h2>
        <p>Capturing light that traveled millions of years just to get here. I prefer silence and simple things. Just
          enjoying the view while the world turns, again.</p>
      </div>
      <div class="Socials">
        <h2>Socials</h2>
        <span class="social-links">
          <a href="https://github.com/HugoAlmeid4" target="_blank" rel="noopener"><span class="social-icon">🐙</span>Github</a>
          <span class="social-separator" aria-hidden="true">-</span>
          <a href="https://gitlab.com/hralmeida" target="_blank" rel="noopener"><span class="social-icon">🦊</span>Gitlab</a>
          <span class="social-separator" aria-hidden="true">-</span>
          <a href="#tally-open=GxkEvO&tally-emoji-text=👋&tally-emoji-animation=wave"><span class="social-icon">✉️</span>Contact Form</a>
        </span>
      </div>
    </section>

    <section class="Posts-Section">
      <h2>Most Recent Posts</h2>
      <div class="posts-scroll" id="postsList">
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="post-header-left" style="width: 100%;">
              <div class="skeleton-line" style="margin-bottom: 8px; max-width: 180px;"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </div>
        <div class="posts-status" id="postsStatus">Loading posts…</div>
      </div>
    </section>

  </main>

  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');

    function updateBtnText() {
      var isDark = document.body.classList.contains('dark-mode');
      themeToggleBtn.innerHTML = isDark ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.5a1 1 0 110-2 1 1 0 010 2zm0 17a1 1 0 110-2 1 1 0 010 2zm9.5-8a1 1 0 110-2 1 1 0 010 2zM4.5 13a1 1 0 110-2 1 1 0 010 2zm12.02-6.78a1 1 0 11-1.42-1.42 1 1 0 011.42 1.42zm-10.04 12.02a1 1 0 11-1.42-1.42 1 1 0 011.42 1.42zm12.02 1.42a1 1 0 11-1.42-1.42 1 1 0 011.42 1.42zM6.46 6.46a1 1 0 11-1.42-1.42 1 1 0 011.42 1.42zM12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>' : '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>';
      themeToggleBtn.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
    }
    updateBtnText();

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      updateBtnText();
      try {
        const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      } catch (e) { }
    });

  </script>
</body>

</html>
