name: Generate RSS & Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'posts/**.md'
      - 'generate-rss.js'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the built-in token so the push triggers pages deploy
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate RSS and index
        run: node generate-rss.js

      - name: Commit generated files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add rss.xml posts/index.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate rss.xml and posts/index.json [skip ci]"
            git push
          fi
