name: Generate RSS & Index

on:
  push:
    branches: [main]
    paths:
      - 'posts/*.md'
      - 'generate-rss.js'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: node generate-rss.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/index.json rss.xml
          git diff --staged --quiet || git commit -m "Update posts/index.json and rss.xml"
          git push
