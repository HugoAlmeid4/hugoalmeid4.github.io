name: Generate RSS & Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'posts/**'
      - 'generate-rss.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run RSS and index generator
        run: node generate-rss.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posts/index.json rss.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate RSS and posts/index.json" && git push)
