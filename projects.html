  <script>
    try {
      var savedTheme = localStorage.getItem('theme');
      if (savedTheme !== 'light') document.body.classList.add('dark-mode');
      var savedLang  = localStorage.getItem('blogLanguage');
      if (['en','pt','es','hi','zh'].indexOf(savedLang) >= 0) {
        document.documentElement.setAttribute('lang', savedLang);
        if (savedLang !== 'en' && document.body) document.body.classList.add('i18n-pending');
      }
    } catch (e) { document.body.classList.add('dark-mode'); }
    window.__i18nPendingTimer = setTimeout(function () {
      if (document.body) document.body.classList.remove('i18n-pending');
      window.__i18nPendingTimer = null;
    }, 1500);
  </script>

  <!-- Project detail overlay. Reuses .project-fullscreen-overlay /
       .project-fullscreen-content CSS already declared in style.css
       (originally authored for posts.js's long-form overlay — exact same
       vocabulary: blurred backdrop, scaled-in panel, sharp 1.5px borders,
       square corners, invert-on-hover close button). -->
  <div class="project-fullscreen-overlay" id="projectOverlay" role="dialog" aria-modal="true" aria-label="Project details" aria-hidden="true">
    <!-- Hero is the first child INSIDE .project-fullscreen-overlay so the
         overlay (fixed, viewport-sized, z-index 1000) paints it on top.
         OUTSIDE the overlay it would be hidden behind the 98%-opaque
         backdrop. The overlay content box already spans the full width,
         so no negative-margin full-bleed trick is needed. -->
    <div class="project-fullscreen-hero" id="projectOverlayHero" hidden></div>
    <div class="project-fullscreen-content" id="projectOverlayContent">
      <button class="project-fullscreen-close" id="projectOverlayClose" type="button" aria-label="Close">&times;</button>
      <span class="project-fullscreen-type" id="projectOverlayType"></span>
      <h2 class="project-fullscreen-title" id="projectOverlayTitle"></h2>
      <div class="project-fullscreen-meta" id="projectOverlayMeta"></div>
      <div class="project-fullscreen-body" id="projectOverlayBody"></div>
      <div class="project-fullscreen-link-container" id="projectOverlayLinks"></div>
    </div>
  </div>
