<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hralmeida's projects, astrophotography technical studies, and dynamic capture log.">
  <title>Projects - Hralmeida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="projects.js" defer></script>
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch(e) {
      document.body.classList.add('dark-mode');
    }
  </script>

  <header class="Name-Photo">
    <img src="imgs/imgs.jpg" alt="Hralmeida profile picture" fetchpriority="high">
    <h3>Hralmeida</h3>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <span class="nav-separator">•</span>
      <a href="projects.html" class="nav-link active">Projects</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
  </header>

  <main>

    <!-- ── Projects Column ── -->
    <div class="Medium-Path">
      <section class="Bio-Socials" style="flex: 1; max-width: 100%;">
        <div>
          <h2>Projects & Studies</h2>
          
          <div id="projectsList">
            <div class="post-card skeleton-card">
              <div class="post-header">
                <div class="post-header-left" style="width: 100%;">
                  <div class="skeleton-line" style="margin-bottom: 8px; max-width: 180px;"></div>
                  <div class="skeleton-line short"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="posts-status" id="projectsStatus" style="display: none;">Loading projects…</div>
        </div>
      </section>
    </div>

    <!-- ── Data Log (Full Width) ── -->
    <div class="capture-log-fullwidth">
      <h2>Capture Log</h2>
      
      <div class="data-log-container">
        <table class="data-log-table">
          <thead>
            <tr>
              <th>Target</th>
              <th>Type</th>
              <th>Integration</th>
              <th>Bortle</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="dataLogBody">
            <tr>
              <td><div class="skeleton-line" style="max-width: 150px;"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line badge"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton-line" style="max-width: 110px;"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line badge"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton-line" style="max-width: 130px;"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line short"></div></td>
              <td><div class="skeleton-line badge"></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="data-log-status" id="dataLogStatus">Loading capture log…</div>
    </div>

  </main>


  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    
    function updateBtnText() {
      if (document.body.classList.contains('dark-mode')) {
        themeToggleBtn.textContent = 'Light Mode';
      } else {
        themeToggleBtn.textContent = 'Dark Mode';
      }
    }
    updateBtnText();

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      updateBtnText();
      try {
        const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      } catch(e) {}
    });
  </script>
</body>

</html>
