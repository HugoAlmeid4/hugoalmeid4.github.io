# ── Sveltia CMS — Admin Dashboard ──
# Git-based CMS that runs entirely in the browser.
# Auth: Personal Access Token (fine-grained, scoped to this repo, Contents: RW only).
# PAT lives only in browser localStorage — never committed to this config.

backend:
  name: github
  repo: HugoAlmeid4/hugoalmeid4.github.io
  branch: main
  # PAT auth (Option B) — Sveltia exposes a "Sign In with Token" button by
  # default for the GitHub backend when no OAuth proxy is configured. The
  # token is pasted by the user and stored in browser localStorage. Fine-
  # grained PAT scoped to this repo, Contents: Read+Write only is the
  # recommended setup. Do NOT add `auth_endpoint` or `base_url` — those are
  # not standard Sveltia keys and will break config parsing.

# Default upload destination. Per-collection media_folder overrides below.
media_folder: 'imgs/uploads'
public_folder: '/imgs/uploads'

# ── Collections ──
collections:
  # ── Posts (markdown files in /posts) ──
  - name: posts
    label: Posts (Blog)
    folder: posts
    extension: md
    format: frontmatter
    create: true
    delete: true
    # Posts reference images as `posts/...` in markdown (`![[foo.png|166]]`).
    # The renderer (posts.js) prepends `posts/` when no scheme is given, so
    # uploaded media must live under `posts/` at the repo root to be reached.
    # Images go directly to posts/ (same dir as markdown files).
    # Using '' avoids double-nesting (media_folder + collection folder).
    media_folder: ''
    public_folder: '/posts'
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: YYYY-MM-DD
        picker_utc: false
        date_format: 'YYYY-MM-DD'
        time_format: false
      - name: excerpt
        label: Excerpt
        widget: text
        hint: Short summary used in card previews.
      - name: author
        label: Author
        widget: string
        required: false
      - name: tags
        label: Tags
        widget: string
        required: false
        hint: Comma-separated (e.g. "dark matter, relativity"). Stored as a single string — the renderer splits it for filtering.
      - name: banner_image
        label: Cover / banner image
        widget: image
        required: false
        multiple: false
        hint: 'Optional hero image shown at the top of the post reader. Uploads land in /posts/ alongside the markdown.'
      - name: banner_image_alt
        label: Banner alt text
        widget: string
        required: false
        hint: 'Describe the banner for screen readers. Falls back to the post title if left blank.'
      - name: banner_image_credit
        label: Banner image credit
        widget: string
        required: false
        hint: 'Photographer / source attribution text. Renders as a small overlay on the bottom-right corner of the banner image. If a credit URL is also set, the credit becomes a clickable link.'
      - name: banner_image_credit_url
        label: Banner image credit URL
        widget: string
        required: false
        hint: 'Optional source URL the credit links to (opens in a new tab). Add the canonical page for the photographer, archive, or paper.'
      - name: draft
        label: Draft
        widget: boolean
        default: false
        required: false
        hint: Hidden from public by default. Add ?preview=drafts to URL to view drafts.
      - name: body
        label: Body (Markdown)
        widget: markdown

  # ── Certificates (markdown files in /certificates) ──
  - name: certificates
    label: Certificates
    folder: certificates
    extension: md
    format: frontmatter
    create: true
    delete: true
    media_folder: 'certificates'
    public_folder: '/certificates'
    fields:
      - name: name
        label: Name
        widget: string
      - name: issuer
        label: Issuer
        widget: string
      - name: issuer_url
        label: Issuer URL
        widget: string
        required: false
      - name: issue_date
        label: Issue date
        widget: string
        required: false
        hint: 'e.g. 2026-06-28 or Jun 28, 2026'
      - name: expiry_date
        label: Expiry date
        widget: string
        required: false
        hint: 'e.g. 2027-06-28 or "Does not expire"'
      - name: credential_id
        label: Credential ID
        widget: string
        required: false
      - name: credential_url
        label: Credential verification URL
        widget: string
        required: false
      - name: skills_covered
        label: Skills covered
        widget: list
        field: { label: Skill, widget: string }
        required: false
      - name: criteria
        label: Criteria
        widget: text
        required: false
        hint: Required hours / sections / assessment criteria.
      - name: bio
        label: Description
        widget: text
        required: false
      - name: file
        label: File (image or PDF)
        widget: image
        required: false
        # `multiple` is Sveltia's renamed option (formerly `allow_multiple` in
        # Decap CMS). Default is false, so this could be omitted — keeping it
        # explicit to make the intent obvious.
        multiple: false
        hint: Upload the certificate image or PDF. Stored in /certificates/.
      - name: is_pdf
        label: 'File is a PDF'
        widget: boolean
        default: false
        required: false
        hint: 'If true, the certificate page renders a PDF thumbnail.'          - name: body
            label: Body (Markdown, optional)
            widget: markdown
            required: false

  # ── Media files (images) ──
  # Generic image registry — the user can add or delete images via
  # /admin → Media. Uploads land in /imgs/uploads/. Items here are just
  # a record of uploaded files with alt / caption metadata so a
  # future page can list "manage uploads" or wrap unrelated images.
  # Other collections (projects, gallery, certificates, posts) keep
  # their own image widgets, which all write into this same uploads
  # dir under the hood.
  - name: media
    label: 'Media files (images)'
    files:
      - name: media-registry
        label: 'Image registry'
        file: data/media.json
        format: json
        media_folder: 'imgs/uploads'
        public_folder: '/imgs/uploads'
        fields:
          - name: items
            label: 'Images'
            widget: list
            summary: '{{fields.filename}}'
            fields:
              - name: filename
                label: 'Image file'
                widget: image
                multiple: false
                hint: 'Drop image here, or paste existing path under /imgs/uploads/. Delete the entry to remove the file from the repo.'
              - name: alt
                label: 'Alt text'
                widget: string
                hint: 'Describe the image for screen readers.'
              - name: caption
                label: 'Caption (optional)'
                widget: text
                required: false
              - name: category
                label: 'Category'
                widget: select
                default: 'misc'
                options:
                  - { label: Projects,    value: projects }
                  - { label: Gallery,     value: gallery }
                  - { label: Certificates, value: certificates }
                  - { label: Misc,        value: misc }
                hint: 'Helpful when the file is referenced from multiple pages.'

  # ── Gallery (single JSON file) ──
  - name: gallery
    label: Gallery
    files:
      - name: gallery-items
        label: Gallery images
        file: gallery/index.json
        format: json
        media_folder: 'gallery'
        public_folder: '/gallery'
        fields:
          - name: items
            label: Gallery items
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: src
                label: Image file
                widget: image
                hint: Drop image here, or paste existing path under /gallery/...
              - name: alt
                label: Alt text (accessibility)
                widget: text
                hint: Describe what's in the image for screen readers.
              # Capture-info fields shown inside the gallery lightbox. These
              # are nested per-item (Sveltia renders one row in the CMS for
              # every entry in `/gallery/index.json` # items[]). Keeping them
              # at the top level would expose a single file-wide input that
              # would clobber all entries on save.
              - name: category
                label: Category slug
                widget: select
                options:
                  - { label: Galaxies,    value: galaxies }
                  - { label: Moon,        value: moon }
                  - { label: 'Star clusters', value: star-clusters }
                  - { label: Nebula,      value: nebulae }
                  - { label: Wide field,  value: wide-field }
                  - { label: Other,       value: other }
                hint: 'Used by the gallery filter tabs. Add new categories here.'
              - name: target
                label: 'Target (sky object)'
                widget: string
                required: false
                hint: 'Renders in the gallery lightbox alongside the photo.'
              - name: date
                label: 'Date captured'
                widget: datetime
                format: YYYY-MM-DD
                picker_utc: false
                date_format: 'YYYY-MM-DD'
                time_format: false
                required: false
              - name: equipment
                label: Equipment
                widget: string
                required: false
                hint: 'Free-text: e.g. "Newtonian 200/1000 + ASI224MC + iOptron CEM40".'
              - name: exposure_total
                label: 'Total integration'
                widget: string
                required: false
                hint: 'e.g. "3.2 hours (192 × 60s subs)".'
              - name: notes
                label: Notes
                widget: text
                required: false

  # ── Home page — Bio, socials, skills chips ──
  - name: bio
    label: 'Home → Bio, Socials, Skills'
    files:
      - name: bio
        label: 'Bio, Socials, Skills'
        file: data/bio.json
        format: json
        fields:
          - name: bio
            label: Bio paragraph
            widget: text
          - name: socials
            label: Social links (homepage)
            widget: list
            fields:
              - name: label
                label: Label
                widget: string
              - name: url
                label: URL
                widget: string
              - name: icon
                label: Icon (emoji)
                widget: string
                required: false
                hint: 'Single emoji, e.g. 🐙 ✉️ 🦊'
          - name: skills_groups
            label: Skills & Tools groups
            widget: list
            fields:
              - name: category
                label: Group name
                widget: string
                hint: 'e.g. Astro, Code, Languages.'
              - name: items
                label: Items
                widget: list
                field: { label: Item, widget: string }

  # ── CV Resume ──
  - name: cv
    label: 'CV'
    files:
      - name: cv
        label: 'CV content'
        file: data/cv.json
        format: json
        fields:
          - name: tagline
            label: Tagline (under name)
            widget: string
          - name: bio
            label: Bio paragraph
            widget: text
          - name: contact
            label: Contact links
            widget: list
            fields:
              - name: label
                label: Display label
                widget: string
              - name: url
                label: URL
                widget: string
          - name: skills
            label: Skills categories
            widget: list
            fields:
              - name: category
                label: Category name
                widget: string
              - name: description
                label: Description
                widget: text
          - name: selected_posts
            label: 'Selected posts (link list)'
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: url
                label: URL or path
                widget: string
          - name: projects_intro
            label: Projects intro text
            widget: string
            required: false
          - name: projects
            label: Projects
            widget: list
            fields:
              - name: description
                label: Description
                widget: string
              - name: url
                label: URL
                widget: string
                required: false
          - name: interests
            label: Interests
            widget: text

  # ── Projects page ──
  # Renders the card grid + detail overlay on /projects. Each entry is a
  # project with a status, year, optional image, optional repo / live link,
  # and a multi-language description. `tech` shows as chips on the card.
  - name: projects
    label: 'Projects'
    files:
      - name: projects
        label: 'Projects content'
        file: data/projects.json
        format: json
        media_folder: 'imgs/projects'
        public_folder: '/imgs/projects'
        fields:
          - name: intro
            label: 'Intro paragraph (above the grid)'
            widget: object
            hint: 'Optional page intro. Leave a language empty to skip it there.'
            fields:
              - { name: en, label: English,    widget: text }
              - { name: pt, label: Português,  widget: text }
              - { name: es, label: Español,    widget: text }
              - { name: hi, label: हिन्दी,   widget: text }
              - { name: zh, label: 中文,        widget: text }
          - name: items
            label: 'Projects'
            widget: list
            summary: '{{fields.title}}'
            fields:
              - name: id
                label: 'Slug / id'
                widget: string
                hint: 'Lowercase, hyphen-separated. Used as the data-* anchor.'
              - name: title
                label: 'Title (per language)'
                widget: object
                fields:
                  - { name: en, label: English,    widget: string }
                  - { name: pt, label: Português,  widget: string }
                  - { name: es, label: Español,    widget: string }
                  - { name: hi, label: हिन्दी,   widget: string }
                  - { name: zh, label: 中文,        widget: string }
              - name: description
                label: 'Short description (per language)'
                widget: object
                hint: 'Renders on the card and the overlay intro.'
                fields:
                  - { name: en, label: English,    widget: text }
                  - { name: pt, label: Português,  widget: text }
                  - { name: es, label: Español,    widget: text }
                  - { name: hi, label: हिन्दी,   widget: text }
                  - { name: zh, label: 中文,        widget: text }
              - name: body
                label: 'Long description (per language, optional)'
                widget: object
                required: false
                hint: 'Renders below the short description in the overlay.'
                fields:
                  - { name: en, label: English,    widget: text }
                  - { name: pt, label: Português,  widget: text }
                  - { name: es, label: Español,    widget: text }
                  - { name: hi, label: हिन्दी,   widget: text }
                  - { name: zh, label: 中文,        widget: text }
              - name: status
                label: 'Status'
                widget: select
                default: 'in-progress'
                options:
                  - { label: Completed,   value: completed }
                  - { label: In progress, value: in-progress }
                  - { label: Planned,     value: planned }
              - name: year
                label: 'Year (string, e.g. 2024 or 2025-2026)'
                widget: string
                required: false
              - name: tech
                label: 'Tech stack (chips)'
                widget: list
                field: { label: Tool, widget: string }
                required: false
                hint: 'One chip per tool / language / framework. Keep entries short.'
              - name: image
                label: 'Preview image'
                widget: image
                required: false
                multiple: false
                hint: 'Goes into /imgs/projects/. Leave blank for placeholder card.'
              - name: repo_url
                label: 'Repository URL'
                widget: string
                required: false
                hint: 'Renders as a "view source" button.'
              - name: live_url
                label: 'Live demo URL'
                widget: string
                required: false
                hint: 'Renders as a "live demo" button.'

  # ── Banner (announcement strip) ──
  # Renders a thin dismissable strip at the very top of every page when
  # `enabled` is true. Per-language text fields prevent the banner from
  # being a half-translated eyesore in non-English locales that haven't
  # been translated yet — leave a field empty to skip that language
  # (banner.js already filters empty strings). The CSS lives in
  # style.css under `.site-banner`; banner.js reads this file at boot.
  - name: banner
    label: 'Banner (announcement strip)'
    files:
      - name: banner
        label: 'Banner content'
        file: data/banner.json
        format: json
        fields:
          - name: enabled
            label: 'Show banner on every page?'
            widget: boolean
            default: false
            hint: 'Globally on/off. Per-language text still controls which locales the banner actually renders in.'
          - name: dismissable
            label: 'Allow visitors to dismiss?'
            widget: boolean
            default: false
            hint: 'Add a small × button on the right. Dismissed state is versioned — editing the text or URL re-shows it.'
          - name: text
            label: 'Banner text (per language)'
            widget: object
            hint: 'Each language has its own field. Leave a field empty to suppress the banner in that language.'
            fields:
              - { name: en, label: English,    widget: string }
              - { name: pt, label: Português,  widget: string }
              - { name: es, label: Español,    widget: string }
              - { name: hi, label: हिन्दी,   widget: string }
              - { name: zh, label: 中文,        widget: string }
          - name: url
            label: 'Optional link URL'
            widget: string
            required: false
            hint: 'External (https://...), in-site (/path), or anchor (#anchor). Whole banner becomes clickable.'


