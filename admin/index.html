<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <title>Admin — Hralmeida</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✎%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:wght@400;700&display=swap" rel="stylesheet">
  <!-- The CDN path is `dist/sveltia-cms.js` (NOT `sveltia.js` — that 404s).
       Version pinned to 0.170.0. Update via https://github.com/sveltia/sveltia-cms/releases -->
  <link rel="preload" href="https://unpkg.com/@sveltia/cms@0.170.0/dist/sveltia-cms.js" as="script">
  <script src="counter.js?v=1" defer></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: rgb(237, 231, 220); color: #333; font-family: "Lilex", monospace; }
    body.dark-mode { background: #1a1a1a; color: #ededed; }
    .admin-noscript {
      max-width: 480px;
      margin: 60px auto;
      padding: 24px;
      border: 1.5px solid #333;
      background: rgba(0, 0, 0, 0.02);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }
    body.dark-mode .admin-noscript {
      border-color: #ededed;
      background: rgba(255, 255, 255, 0.03);
    }
    .admin-error {
      max-width: 520px;
      margin: 60px auto;
      padding: 24px;
      border: 1.5px solid #c62828;
      background: rgba(198, 40, 40, 0.05);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Visits counter ──
       Fixed-position footer strip with the same minimal aesthetic as the
       rest of the admin page (uppercase Lilex, 1.5px hairline border).
       Pinned (not flowing) so Sveltia CMS's body mount can't displace it
       — fixed elements always occupy the viewport regardless of where Sveltia
       inserts its shadow-DOM UI. z-index 99999 sits above Sveltia modals
       (its polymer overlays commonly use 10000+). */
    .admin-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 18px;
      background: rgb(237, 231, 220);
      color: #1a1a1a;
      border: 1.5px solid #333;
      font-family: "Lilex", monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      z-index: 99999;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }
    body.dark-mode .admin-counter {
      background: #1a1a1a;
      color: #ededed;
      border-color: #ededed;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .admin-counter-label {
      opacity: 0.7;
    }
    .admin-counter-value {
      font-weight: 700;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      /* Reserved width + right-align stops the centered card from
         shimmering between the loading "…" placeholder and a wider
         final number like "1,234". */
      min-width: 3ch;
      text-align: right;
      display: inline-block;
    }
    .admin-counter-value.loading {
      opacity: 0.4;
    }
    /* Universal error class — counter.js adds `.visit-counter-error` on the
       wrapper on fetch failure. Selector matches both the admin-specific
       `.admin-counter-value` (this page) and the public-site
       `.site-counter-value` (style.css) so the same script works everywhere. */
    .visit-counter-error .admin-counter-value {
      color: #c62828;
    }
    body.dark-mode .visit-counter-error .admin-counter-value {
      color: #ef5350;
    }
    .admin-counter-meta {
      opacity: 0.5;
      font-size: 10px;
      letter-spacing: 0.04em;
    }
  </style>
  <script>
    /* Match the site's theme before Sveltia's UI paints. */
    try {
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch (e) {
      document.body.classList.add('dark-mode');
    }

    /* CDN-failure backstop: if Sveltia's script doesn't load OR errors out,
       show a message so the user is never stranded on a blank page.
       Two paths trigger this: (1) the <script> onerror attribute, (2)
       any uncaught error that prevents Sveltia from mounting. */
    window.__sveltiaFailed = false;
    window.addEventListener('error', function (e) {
      if (window.__sveltiaFailed) return;
      // Only catch script load errors from Sveltia's CDN, not user-side issues.
      var src = (e.target && e.target.src) || '';
      if (src && src.indexOf('sveltia-cms') !== -1) {
        window.__sveltiaFailed = true;
        showCdnError(e.message || 'Sveltia script failed to load.');
      }
    }, true);
    function showCdnError(reason) {
      var existing = document.getElementById('admin-cdn-error');
      if (existing) return;
      var wrap = document.createElement('div');
      wrap.id = 'admin-cdn-error';
      wrap.className = 'admin-error';
      wrap.innerHTML =
        '<strong>Sveltia CMS failed to load.</strong><br>' +
        'Reason: <code>' + (reason || 'unknown') + '</code><br><br>' +
        'Common causes:<br>' +
        '&middot; <code>unpkg.com</code> unreachable from this network<br>' +
        '&middot; Ad-blocker or privacy extension blocking the script<br>' +
        '&middot; Outdated pinned version (check <a href="https://github.com/sveltia/sveltia-cms/releases">releases</a>)<br><br>' +
        'Try opening the browser console (F12) for the exact error.';
      document.body.appendChild(wrap);
    }
  </script>
</head>
<body>
  <noscript>
    <div class="admin-noscript">
      The admin dashboard requires JavaScript. Please enable it and reload.
    </div>
  </noscript>

  <!-- Sveltia CMS — git-based. Talks to GitHub API directly when configured
       with a fine-grained PAT (no Cloudflare Worker / OAuth proxy needed).
       <script onerror> feeds the same error backstop as the window error
       listener above. -->
  <script
    src="https://unpkg.com/@sveltia/cms@0.170.0/dist/sveltia-cms.js"
    defer
    onerror="window.__sveltiaFailed=true;showCdnError('CDN script did not load.');">
  </script>

  <!-- ── Visit counter ──
       Footer-style strip pinned to viewport bottom. Shares counter.js with
       the public site, both pages increment the same hralmeida-website
       counter so this strip reflects total site visits. Uses ad-blocker-
       friendly ids/classes (.visit-counter-*) so the shared JS finds it. -->
  <div id="visit-counter" class="visit-counter admin-counter" aria-live="polite">
    <span class="visit-counter-label admin-counter-label">Site visits</span>
    <span class="visit-counter-value admin-counter-value loading" id="visit-counter-value">…</span>
    <span class="visit-counter-meta admin-counter-meta" id="visit-counter-meta"></span>
  </div>
  <script src="counter.js?v=1" defer></script>
</body>
</html>
