<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <title>Admin — Hralmeida</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✎%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:wght@400;700&display=swap" rel="stylesheet">
  <!-- The CDN path is `dist/sveltia-cms.js` (NOT `sveltia.js` — that 404s).
       Version pinned to 0.170.0. Update via https://github.com/sveltia/sveltia-cms/releases -->
  <link rel="preload" href="https://unpkg.com/@sveltia/cms@0.170.0/dist/sveltia-cms.js" as="script">
  <script src="/counter.js?v=2" defer></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: rgb(237, 231, 220); color: #333; font-family: "Lilex", monospace; }
    body.dark-mode { background: #1a1a1a; color: #ededed; }
    .admin-noscript {
      max-width: 480px;
      margin: 60px auto;
      padding: 24px;
      border: 1.5px solid #333;
      background: rgba(0, 0, 0, 0.02);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }
    body.dark-mode .admin-noscript {
      border-color: #ededed;
      background: rgba(255, 255, 255, 0.03);
    }
    .admin-error {
      max-width: 520px;
      margin: 60px auto;
      padding: 24px;
      border: 1.5px solid #c62828;
      background: rgba(198, 40, 40, 0.05);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Visits counter toggle ──
       A small pill button fixed at the bottom-centre of the viewport.
       Clicking it reveals/hides the counter panel. */
    .admin-counter-toggle {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgb(237, 231, 220);
      color: #1a1a1a;
      border: 1.5px solid #333;
      font-family: "Lilex", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      z-index: 99999;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: background 0.2s ease, color 0.2s ease;
      user-select: none;
    }
    .admin-counter-toggle:hover {
      background: #333;
      color: rgb(237, 231, 220);
    }
    body.dark-mode .admin-counter-toggle {
      background: #1a1a1a;
      color: #ededed;
      border-color: #ededed;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .admin-counter-toggle:hover {
      background: #ededed;
      color: #1a1a1a;
    }

    /* ── Visits counter panel ──
       Fixed-position footer strip hidden by default. Shown when the toggle
       button above is clicked. Same minimal aesthetic (uppercase Lilex,
       1.5px hairline border). Pinned so Sveltia CMS can't displace it. */
    .admin-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: baseline;
      gap: 10px;
      padding: 10px 18px;
      background: rgb(237, 231, 220);
      color: #1a1a1a;
      border: 1.5px solid #333;
      font-family: "Lilex", monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      z-index: 99999;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }
    .admin-counter.visible {
      display: inline-flex;
    }
    body.dark-mode .admin-counter {
      background: #1a1a1a;
      color: #ededed;
      border-color: #ededed;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .admin-counter-label {
      opacity: 0.7;
    }
    .admin-counter-value {
      font-weight: 700;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: right;
      display: inline-block;
    }
    .admin-counter-value.loading {
      opacity: 0.4;
    }
    .visit-counter-error .admin-counter-value {
      color: #c62828;
    }
    body.dark-mode .visit-counter-error .admin-counter-value {
      color: #ef5350;
    }
    .admin-counter-meta {
      opacity: 0.5;
      font-size: 10px;
      letter-spacing: 0.04em;
    }
  </style>
  <script>
    /* Match the site's theme before Sveltia's UI paints. Guarded against
       <head>-parse-time where document.body is still null (would otherwise
       throw and abort the rest of this script, including the Sveltia
       error backstop below). */
    try {
      if (document.body && localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    } catch (e) {
      /* swallow — no-op when document.body is unavailable */
    }

    /* CDN-failure backstop: if Sveltia's script doesn't load OR errors out,
       show a message so the user is never stranded on a blank page.
       Two paths trigger this: (1) the <script> onerror attribute, (2)
       any uncaught error that prevents Sveltia from mounting. */
    window.__sveltiaFailed = false;
    window.addEventListener('error', function (e) {
      if (window.__sveltiaFailed) return;
      // Only catch script load errors from Sveltia's CDN, not user-side issues.
      var src = (e.target && e.target.src) || '';
      if (src && src.indexOf('sveltia-cms') !== -1) {
        window.__sveltiaFailed = true;
        showCdnError(e.message || 'Sveltia script failed to load.');
      }
    }, true);
    function showCdnError(reason) {
      var existing = document.getElementById('admin-cdn-error');
      if (existing) return;
      var wrap = document.createElement('div');
      wrap.id = 'admin-cdn-error';
      wrap.className = 'admin-error';
      wrap.innerHTML =
        '<strong>Sveltia CMS failed to load.</strong><br>' +
        'Reason: <code>' + (reason || 'unknown') + '</code><br><br>' +
        'Common causes:<br>' +
        '&middot; <code>unpkg.com</code> unreachable from this network<br>' +
        '&middot; Ad-blocker or privacy extension blocking the script<br>' +
        '&middot; Outdated pinned version (check <a href="https://github.com/sveltia/sveltia-cms/releases">releases</a>)<br><br>' +
        'Try opening the browser console (F12) for the exact error.';
      document.body.appendChild(wrap);
    }
  </script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NLETHH38EW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-NLETHH38EW');
  </script>
</head>
<body>
  <noscript>
    <div class="admin-noscript">
      The admin dashboard requires JavaScript. Please enable it and reload.
    </div>
  </noscript>

  <!-- Sveltia CMS — git-based. Talks to GitHub API directly when configured
       with a fine-grained PAT (no Cloudflare Worker / OAuth proxy needed).
       <script onerror> feeds the same error backstop as the window error
       listener above. -->
  <script
    src="https://unpkg.com/@sveltia/cms@0.170.0/dist/sveltia-cms.js"
    defer
    onerror="window.__sveltiaFailed=true;showCdnError('CDN script did not load.');">
  </script>

  <!-- ── Visit counter toggle ──
       Small pill button at viewport bottom. Clicking it toggles the counter
       panel below. Hidden when the panel is visible (panel replaces it). -->
  <button type="button" class="admin-counter-toggle" id="adminCounterToggle">VISITS</button>

  <!-- ── Visit counter panel ──
       Footer-style strip pinned to viewport bottom. Hidden by default;
       shown when the toggle button above is clicked. Shares counter.js
       with the public site. -->
  <div id="visit-counter" class="visit-counter admin-counter" aria-live="polite">
    <span class="visit-counter-label admin-counter-label">Site visits</span>
    <span class="visit-counter-value admin-counter-value loading" id="visit-counter-value">…</span>
    <span class="visit-counter-meta admin-counter-meta" id="visit-counter-meta"></span>
  </div>

  <script>
    /* Toggle the visit counter panel on/off. Hides the toggle button when
       the panel is visible so they don't overlap. */
    (function() {
      var toggle = document.getElementById('adminCounterToggle');
      var panel = document.getElementById('visit-counter');
      if (!toggle || !panel) return;
      toggle.addEventListener('click', function() {
        var showing = panel.classList.toggle('visible');
        toggle.style.display = showing ? 'none' : '';
      });
    })();
  </script>
</body>
</html>
