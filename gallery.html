  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilex:ital,wght@0,400..700;1,400..700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=56">
  <link rel="preload" as="image" href="imgs/imgs.webp" fetchpriority="high">
  <link rel="alternate" type="application/rss+xml" title="Hralmeida RSS" href="rss.xml">

  <script src="hamburger.js?v=32" defer></script>
  <script src="gallery.js?v=22" defer></script>

</head>

<body>
  <script>
    try {
      var savedTheme = localStorage.getItem('theme');
      if (savedTheme !== 'light') document.body.classList.add('dark-mode');
      var savedLang  = localStorage.getItem('blogLanguage');
      if (['en','pt','es','hi','zh'].indexOf(savedLang) >= 0) {
        document.documentElement.setAttribute('lang', savedLang);
        if (savedLang !== 'en' && document.body) document.body.classList.add('i18n-pending');
      }
    } catch (e) { document.body.classList.add('dark-mode'); }
    window.__i18nPendingTimer = setTimeout(function () {
      if (document.body) document.body.classList.remove('i18n-pending');
      window.__i18nPendingTimer = null;
    }, 1500);
  </script>

  <header class="Name-Photo">
    <picture>
    <source srcset="imgs/imgs.webp" type="image/webp">
    <img src="imgs/imgs.jpg" alt="Hralmeida profile picture" width="100" height="100" fetchpriority="high">
  </picture>
    <h3>Hralmeida</h3>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="gallery.html" class="nav-link active" aria-current="page" data-i18n="navGallery">Gallery</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="certificates.html" class="nav-link" data-i18n="navCertificates">Certificates</a>
      <span class="nav-separator" aria-hidden="true">/</span>
      <a href="projects.html" class="nav-link" data-i18n="navProjects">Projects</a>

    </nav>
    <div class="header-extras">
      <div id="globalLangSwitcher" class="language-switcher-container"></div>
      <div class="theme-segmented" role="group" aria-label="Theme selector">
        <button id="theme-light" class="theme-seg-btn" type="button" aria-label="Switch to light theme" data-theme="light"></button>
        <button id="theme-dark" class="theme-seg-btn" type="button" aria-label="Switch to dark theme" data-theme="dark"></button>
      </div>
    </div>
    <button class="hamburger-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="hamburger-menu" type="button">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <div class="hamburger-menu" id="hamburger-menu" aria-hidden="true" role="navigation" aria-label="Mobile menu">
      <div class="hamburger-menu-inner">
        <div class="hamburger-menu-lang"></div>
        <div class="hamburger-menu-theme">
          <button id="theme-toggle" class="hamburger-theme-toggle" type="button" aria-label="Toggle theme"></button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="gallery-section" aria-label="Astrophotography gallery">
      <div class="gallery-section-header">
        <h2 data-i18n="galleryHeader">Gallery</h2>
        <p class="gallery-section-subtitle" data-i18n="gallerySubtitle">Capturing light that traveled millions of years.</p>
      </div>

      <!-- One-time disclaimer banner about image compression -->
      <div id="gallery-disclaimer" class="gallery-disclaimer" style="display: none;">
        <span class="disclaimer-text" data-i18n="galleryDisclaimer">Note: Gallery images are slightly compressed for optimal load performance.</span>
        <button id="dismiss-disclaimer" class="close-disclaimer" data-i18n-aria-label="lbClose" aria-label="Dismiss disclaimer">&#10005;</button>
      </div>

      <div class="gallery-tabs" role="tablist" aria-label="Filter by category"></div>
      <div class="gallery-search-container">
        <input type="text" id="gallery-search-input" data-i18n-placeholder="gallerySearchPlaceholder" placeholder="Search gallery by target, cluster name, or description…" aria-label="Search gallery items">
      </div>
      <div class="gallery-grid" id="gallery-grid" role="tabpanel" aria-labelledby="tab-all"></div>
      <div class="gallery-status" id="gallery-status" aria-live="polite"></div>
    </section>
  </main>

  <div class="gallery-lightbox" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" aria-hidden="true">
    <div class="gallery-lightbox-inner">
      <div class="gallery-lightbox-topbar">
        <span class="gallery-lightbox-counter" id="lightbox-counter" aria-live="polite"></span>
        <button class="gallery-lightbox-close" id="lightbox-close" data-i18n-aria-label="lbClose" aria-label="Close image viewer">&#10005;</button>
      </div>
      <div class="gallery-lightbox-spinner" id="lightbox-spinner" aria-hidden="true"></div>
      <div class="gallery-lightbox-img-wrap">
        <img id="lightbox-img" src="" alt="" draggable="false" decoding="async">
      </div>
      <button class="gallery-lightbox-nav prev" id="lightbox-prev" data-i18n-aria-label="lbPrevious" aria-label="Previous image">&#8592;</button>
      <button class="gallery-lightbox-nav next" id="lightbox-next" data-i18n-aria-label="lbNext" aria-label="Next image">&#8594;</button>
      <div class="gallery-lightbox-bottombar">
        <span class="gallery-lightbox-caption" id="lightbox-caption"></span>
        <button class="gallery-lightbox-download" id="lightbox-download" data-i18n-aria-label="lbDownload" aria-label="Download image with watermark">&#8595; <span data-i18n="lbDownload">Download</span></button>
      </div>
      <div class="gallery-lightbox-info" id="lightbox-info" hidden>
        <div class="info-row"><span class="info-label" data-i18n="lbInfoTarget">Target</span><span class="info-value" data-info-key="target"></span></div>
        <div class="info-row"><span class="info-label" data-i18n="lbInfoCaptured">Captured</span><span class="info-value" data-info-key="date"></span></div>
        <div class="info-row"><span class="info-label" data-i18n="lbInfoEquipment">Equipment</span><span class="info-value" data-info-key="equipment"></span></div>
        <div class="info-row"><span class="info-label" data-i18n="lbInfoIntegration">Integration</span><span class="info-value" data-info-key="exposure_total"></span></div>
        <div class="info-row"><span class="info-label" data-i18n="lbInfoNotes">Notes</span><span class="info-value" data-info-key="notes"></span></div>
      </div>
    </div>
  </div>

  <canvas id="watermark-canvas" style="display:none;" aria-hidden="true"></canvas>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(function () { /* disable PWA offline */ });
      });
    }
  </script>
</body>

</html>
